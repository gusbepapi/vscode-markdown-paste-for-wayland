name: Publishing the configured and generated extension

on:
  workflow_run:
    workflows: ["Pre-release extension configuration, generation and publication"]
    types:
      - completed

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checking the repository out
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Extract version
        run: echo "VERSION=$(jq -r .version package.json)" >> $GITHUB_ENV
      - name: Releasing
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          target_commitish: ${{ github.event.workflow_run.head_sha }}

  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    container: archlinux:multilib-devel

    steps:
      - name: Installing Git and Node.js
        run: pacman -Syu --noconfirm --needed git nodejs npm

      - name: Checking the repository out
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Installing the dependencies
        run: npm install

      - name: Publishing for VSCE
        run: npx vsce publish -p ${{ secrets.VSCE_TOKEN }}

      - name: Publishing for Open VSX
        run: npx ovsx publish -p ${{ secrets.OPEN_VSX_TOKEN }}
