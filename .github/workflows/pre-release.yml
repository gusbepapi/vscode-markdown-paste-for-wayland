name: Pre-release extension configuration, generation and publication

on:
  workflow_run:
    workflows: ["Runing the unit tests"]
    types:
      - completed

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checking the repository out
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Extract version
        run: echo "VERSION=$(jq -r .version package.json)" >> $GITHUB_ENV
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: pre${{ env.VERSION }}
          target_commitish: ${{ github.event.workflow_run.head_sha }}
          prerelease: true

  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    container: archlinux:multilib-devel

    steps:
      - name: Installing Git and Node.js
        run: pacman -Syu --noconfirm --nedded git nodejs npm

      - name: Checking the repository out
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Installing the dependencies
        run: npm ci

      - name: Publishing the pre-release extension
        run: npx vsce publish -p ${{ secrets.VSCE_TOKEN }} --pre-release
